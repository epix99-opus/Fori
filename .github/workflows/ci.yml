name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
      - "claude/**"
      - "hermes/**"
      - "cursor/**"

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install web dependencies
        run: npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build --if-present

  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt
      - name: FastAPI import smoke
        run: cd apps/api && python -c "from main import app; print(app.title)"
